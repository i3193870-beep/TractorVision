<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TractorVision Ultra | Global Edition</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-bg: #0b0e11;
            --card-bg: #161b22;
            --text-white: #e6edf3;
            --accent-gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            margin: 0;
            overflow-x: hidden;
        }

        /* خلفية الجزيئات المتحركة */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* القائمة الجانبية */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: 0;
            background-color: #0d1117;
            transition: 0.5s;
            padding-top: 60px;
            border-left: 1px solid var(--primary-green);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
            transition: 0.3s;
            cursor: pointer;
            border-bottom: 1px solid #21262d;
        }

        .sidebar a:hover { background-color: #1c2128; color: var(--primary-green); }
        .sidebar .closebtn { position: absolute; top: 0; left: 25px; font-size: 36px; color: var(--primary-green); }

        /* أزرار اللغات */
        .lang-switch { padding: 15px 25px; display: flex; gap: 10px; }
        .lang-btn { 
            padding: 5px 12px; cursor: pointer; border: 1px solid var(--primary-green); 
            background: none; color: white; border-radius: 4px; font-size: 12px;
            transition: 0.3s;
        }
        .lang-btn:hover { background: var(--primary-green); color: black; }

        /* زر فتح القائمة */
        .openbtn {
            font-size: 20px; cursor: pointer; background: var(--card-bg);
            color: var(--primary-green); padding: 10px 15px; border: 1px solid var(--primary-green);
            border-radius: 8px; position: fixed; top: 20px; right: 20px; z-index: 999;
        }

        /* الحاوية الرئيسية */
        .container {
            display: flex; flex-direction: column; align-items: center; padding: 80px 20px;
        }

        .main-card {
            background: var(--card-bg); padding: 30px; border-radius: 20px;
            width: 100%; max-width: 500px; border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, button {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            background: #0d1117; color: white; border: 1px solid #30363d;
            font-size: 16px;
        }

        .btn-calc { background: var(--primary-green); color: black; font-weight: bold; cursor: pointer; border: none; }
        .btn-calc:hover { background: #27ae60; }

        /* تنسيق المقارنة والسجل */
        .compare-box { background: #1c2128; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .history-item { padding: 10px; border-bottom: 1px solid #30363d; font-size: 14px; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<button class="openbtn" onclick="openNav()">☰ Menu</button>

<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
    
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('de')">DE</button>
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
    </div>

    <a onclick="showSection('calc')" id="menu-calc">Calculator</a>
    <a onclick="showSection('comp')" id="menu-comp">Compare</a>
    <a onclick="showSection('hist')" id="menu-hist">History</a>
</div>

<div class="container">
    <div class="main-card">
        <h2 id="main-title" style="text-align:center; color:var(--primary-green);">TractorVision PRO</h2>
        
        <div id="calc" class="section active">
            <label id="lbl-model">Tractor Model</label>
            <select id="model">
                <option value="320000">Fendt 1050 Vario</option>
                <option value="280000">John Deere 8R</option>
                <option value="150000">Kirovets K-700</option>
                <option value="45000">Lanz Bulldog</option>
            </select>
            
            <label id="lbl-year">Year</label>
            <input type="number" id="year" value="2022">
            
            <label id="lbl-hours">Work Hours</label>
            <input type="number" id="hours" placeholder="0000">
            
            <button class="btn-calc" onclick="calculate()" id="btn-calc">Calculate Price</button>
            <div id="result" style="text-align:center; font-size:24px; margin-top:15px; color:var(--accent-gold);"></div>
        </div>

        <div id="comp" class="section">
            <h3 id="comp-title">Comparison</h3>
            <select id="comp-select" onchange="runCompare()">
                <option value="fendt">Fendt 1050 Vario</option>
                <option value="jd">John Deere 9RX</option>
                <option value="kirovets">Kirovets K-700</option>
                <option value="lanz">Lanz Bulldog</option>
            </select>
            <div id="comp-result" class="compare-box"></div>
        </div>

        <div id="hist" class="section">
            <h3 id="hist-title">Recent History</h3>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<script>
    // بيانات الجرارات للمقارنة
    const tractorData = {
        fendt: { en: "517 HP, Vario transmission, high comfort.", de: "517 PS, Vario-Getriebe, hoher Komfort.", fr: "517 CV, transmission Vario, grand confort." },
        jd: { en: "640 HP, AI technology, expensive parts.", de: "640 PS, KI-Technologie, teure Ersatzteile.", fr: "640 CV, technologie IA, pièces chères." },
        kirovets: { en: "300 HP, V8 Turbo, unbreakable build.", de: "300 PS, V8 Turbo, unzerstörbare Bauweise.", fr: "300 CV, V8 Turbo, construction incassable." },
        lanz: { en: "55 HP, Classic, high fuel consumption.", de: "55 PS, Klassiker, hoher Kraftstoffverbrauch.", fr: "55 CV, Classique, consommation élevée." }
    };

    const translations = {
        en: {
            calc: "Calculator", comp: "Compare", hist: "History",
            lblModel: "Tractor Model", lblYear: "Year", lblHours: "Work Hours",
            btnCalc: "Calculate Price", compTitle: "Comparison", histTitle: "History",
            currency: "€"
        },
        de: {
            calc: "Rechner", comp: "Vergleichen", hist: "Verlauf",
            lblModel: "Traktormodell", lblYear: "Baujahr", lblHours: "Betriebsstunden",
            btnCalc: "Preis berechnen", compTitle: "Vergleich", histTitle: "Verlauf",
            currency: "€"
        },
        fr: {
            calc: "Calculatrice", comp: "Comparer", hist: "Historique",
            lblModel: "Modèle de Tracteur", lblYear: "Année", lblHours: "Heures de travail",
            btnCalc: "Calculer le prix", compTitle: "Comparaison", histTitle: "Historique",
            currency: "€"
        }
    };

    let currentLang = 'en';

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('menu-calc').innerText = t.calc;
        document.getElementById('menu-comp').innerText = t.comp;
        document.getElementById('menu-hist').innerText = t.hist;
        document.getElementById('lbl-model').innerText = t.lblModel;
        document.getElementById('lbl-year').innerText = t.lblYear;
        document.getElementById('lbl-hours').innerText = t.lblHours;
        document.getElementById('btn-calc').innerText = t.btnCalc;
        document.getElementById('comp-title').innerText = t.compTitle;
        document.getElementById('hist-title').innerText = t.histTitle;
        runCompare(); // تحديث لغة المقارنة إذا كانت مفتوحة
        closeNav();
    }

    function openNav() { document.getElementById("mySidebar").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        closeNav();
    }

    function calculate() {
        const base = document.getElementById('model').value;
        const yr = document.getElementById('year').value;
        const hr = document.getElementById('hours').value;
        let res = base - ((2026 - yr) * (base * 0.05)) - (hr * 5);
        if(res < 5000) res = 5000;
        document.getElementById('result').innerText = Math.round(res).toLocaleString() + " €";
        
        const item = document.createElement('div');
        item.className = "history-item";
        item.innerText = Math.round(res).toLocaleString() + " € (" + yr + ")";
        document.getElementById('history-list').prepend(item);
    }

    function runCompare() {
        const model = document.getElementById('comp-select').value;
        document.getElementById('comp-result').innerText = tractorData[model][currentLang];
    }

    // إعداد خلفية الجزيئات
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#2ecc71" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#2ecc71", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2 }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "repulse" } }
        }
    });

    // تشغيل المقارنة الافتراضية
    runCompare();
</script>

</body>
</html>
